services:
  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    cap_add:
      - IPC_LOCK          # ป้องกัน secret หลุด swap
    volumes:
      - vault_data:/vault/data
    networks:
      - secure-video-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault-agent:
    image: hashicorp/vault:1.15
    container_name: vault-agent
    restart: unless-stopped
    command: agent -config=/vault/config/agent.hcl
    environment:
      VAULT_ADDR: http://vault:8200
    volumes:
      - ./vault/agent.hcl:/vault/config/agent.hcl:ro   # config file
      - ./vault/templates:/vault/templates:ro           # template ไฟล์ .env
      - vault-agent-secrets:/vault/secrets              # output secrets (shared volume)
      - ./BackEnd/keys:/app/keys:ro                     # AppRole credentials
    networks:
      - secure-video-network
    depends_on:
      vault:
        condition: service_healthy
    cap_add:
      - IPC_LOCK

networks:
  secure-video-network:
    driver: bridge

volumes:
  vault_data:
  vault-agent-secrets:    # << เพิ่ม shared volume สำหรับ secrets