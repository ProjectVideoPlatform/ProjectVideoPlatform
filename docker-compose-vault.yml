services:
  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
    networks:
      - secure-video-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault-secrets-init:
    image: busybox
    container_name: vault-secrets-init
    restart: "no"
    command: sh -c "chmod 777 /vault/secrets && echo 'permission fixed'"
    volumes:
      - vault-agent-secretsja:/vault/secrets



networks:
  secure-video-network:
       driver: bridge


volumes:
  vault_data:
  vault-agent-secretsja: