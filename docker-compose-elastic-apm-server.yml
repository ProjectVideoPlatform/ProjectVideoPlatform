version: "3.9"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    container_name: elasticsearch

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=changeme
      - ES_JAVA_OPTS=-Xms1g -Xmx1g

    mem_limit: 2g
    mem_reservation: 512m
    cpus: "1.0"

    ports:
      - "9200:9200"

    volumes:
      - es-data:/usr/share/elasticsearch/data

    networks:
      - secure-video-network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -u elastic:changeme -s http://localhost:9200 >/dev/null"
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  setup-kibana-user:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    container_name: setup-kibana-user

    depends_on:
      elasticsearch:
        condition: service_healthy

    command: >
      bash -c "
      curl -X POST
      -u elastic:changeme
      http://elasticsearch:9200/_security/user/kibana_system/_password
      -H 'Content-Type: application/json'
      -d '{\"password\":\"kibana123\"}'
      && echo 'kibana_system password updated'
      "

    restart: "no"

    networks:
      - secure-video-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.1
    container_name: kibana

    depends_on:
      elasticsearch:
        condition: service_healthy

      setup-kibana-user:
        condition: service_completed_successfully

    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=kibana123

      - xpack.security.enabled=true

      - xpack.encryptedSavedObjects.encryptionKey=abcdefghijklmnopqrstuvwxyz123456
      - xpack.security.encryptionKey=abcdefghijklmnopqrstuvwxyz123456
      - xpack.reporting.encryptionKey=abcdefghijklmnopqrstuvwxyz123456

      # Fleet
      - xpack.fleet.agents.enabled=true
      - xpack.fleet.agents.fleet_server.hosts=["http://fleet-server:8220"]

      # Default output
      - xpack.fleet.outputs=[{"id":"fleet-default-output","name":"default","type":"elasticsearch","hosts":["http://elasticsearch:9200"],"is_default":true,"is_default_monitoring":true}]

      # Auto install packages
      - xpack.fleet.packages=[{"name":"system","version":"latest"},{"name":"docker","version":"latest"},{"name":"apm","version":"latest"},{"name":"fleet_server","version":"latest"}]

      # Fleet server policy
      - xpack.fleet.agentPolicies=[{"name":"Fleet Server Policy","id":"fleet-server-policy","is_default_fleet_server":true,"namespace":"default","monitoring_enabled":["logs","metrics"],"package_policies":[{"name":"fleet_server-1","package":{"name":"fleet_server"}}]}]

    mem_limit: 1g
    cpus: "0.75"

    ports:
      - "5601:5601"

    networks:
      - secure-video-network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:5601/api/status | grep -q 'available'"
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.14.1
    container_name: apm-server

    depends_on:
      elasticsearch:
        condition: service_healthy

    command: >
      apm-server -e
      -E apm-server.host=0.0.0.0:8200
      -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
      -E output.elasticsearch.username=elastic
      -E output.elasticsearch.password=changeme
      -E setup.kibana.host=http://kibana:5601

    ports:
      - "8200:8200"

    networks:
      - secure-video-network


volumes:
  es-data:

networks:
  secure-video-network:
    driver: bridge