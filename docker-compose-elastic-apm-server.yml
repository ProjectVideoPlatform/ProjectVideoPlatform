version: "3.9"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    container_name: elasticsearch

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=changeme
      - ES_JAVA_OPTS=-Xms1g -Xmx1g

    mem_limit: 2g

    ports:
      - "9200:9200"

    networks:
      - secure-video-network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -u elastic:changeme -s http://localhost:9200 >/dev/null"
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.1
    container_name: kibana

    depends_on:
      elasticsearch:
        condition: service_healthy

    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=kibana123

      # สำคัญสำหรับ APM UI
      - xpack.encryptedSavedObjects.encryptionKey=abcdefghijklmnopqrstuvwxyz123456

      - NODE_OPTIONS=--max-old-space-size=1024

    mem_limit: 1.5g

    ports:
      - "5601:5601"

    networks:
      - secure-video-network
  setup-kibana-user:
      image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
      container_name: setup-kibana-user

      depends_on:
        elasticsearch:
          condition: service_healthy

      command: >
        bash -c "
        curl -X POST
        -u elastic:changeme
        http://elasticsearch:9200/_security/user/kibana_system/_password
        -H 'Content-Type: application/json'
        -d '{\"password\":\"kibana123\"}'
        && echo 'kibana_system password updated'
        "

      restart: "no"

      networks:
        - secure-video-network
  apm-server:
    image: docker.elastic.co/apm/apm-server:8.14.1
    container_name: apm-server

    depends_on:
      elasticsearch:
        condition: service_healthy

    command: >
      apm-server -e
      -E apm-server.host=0.0.0.0:8200
      -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
      -E output.elasticsearch.username=elastic
      -E output.elasticsearch.password=changeme
      -E setup.kibana.host=http://kibana:5601

    ports:
      - "8200:8200"

    networks:
      - secure-video-network

networks:
  secure-video-network:
    driver: bridge
