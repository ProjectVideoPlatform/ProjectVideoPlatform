apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # ใช้ชื่อ Service ใน Docker Compose แทน IP
    url: http://prometheus:9090 
    isDefault: true
    editable: true
    jsonData:
      httpMethod: GET
      # ปรับตามความเหมาะสม (15s เท่ากับ scrape_interval ของคุณ)
      timeInterval: 15s