global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "prometheus:9090"

  - job_name: "backend"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "app:3000"
  - job_name: "kafka"
    static_configs:
      - targets:
          - "kafka-exporter: 9308" # พอร์ตมาตรฐานของ Kafka Exporter