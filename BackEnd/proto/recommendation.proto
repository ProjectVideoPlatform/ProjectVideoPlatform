// proto/recommendation.proto
syntax = "proto3";

package recommendation;

service RecommendationService {
  rpc GetRecommended (RecommendRequest)   returns (VideoListResponse);
  rpc GetTrending    (TrendingRequest)    returns (VideoListResponse);
  rpc GetCoWatch     (CoWatchRequest)     returns (CoWatchResponse);
}

message RecommendRequest {
  string user_id = 1;
  int32  limit   = 2;
}

message TrendingRequest {
  int32 limit = 1;
}

message CoWatchRequest {
  string video_id = 1;
  int32  limit    = 2;
}

message Video {
  string id          = 1;
  string title       = 2;
  string access_type = 3;
  repeated string tags = 4;
}

message VideoListResponse {
  repeated Video videos        = 1;
  string         source        = 2;
  string         boost_category = 3;
}

message CoWatchResponse {
  repeated Video videos = 1;
}