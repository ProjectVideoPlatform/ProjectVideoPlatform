worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    resolver 127.0.0.11 valid=30s;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 2G;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log notice;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/javascript
        text/xml
        application/xml
        image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=ws_limit:10m;

    upstream app {
        server app:3000;
    }

    upstream mongo_express {
        server mongo-express:8081;
    }

    server {
        listen 80;
        server_name localhost;

        # -------------------------
        # WebSocket (App backend)
        # -------------------------
# ลบ / ตัวสุดท้ายออก เพื่อให้ดักจับได้ทั้งสองแบบ
location /ws {
    proxy_pass http://app; # ตรวจสอบว่าชื่อ 'app' ตรงกับชื่อ service ใน docker-compose
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Timeouts สำคัญมากสำหรับ WS เพื่อไม่ให้สายหลุดบ่อย
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
        # -------------------------
        # Upload (ต้องอยู่เหนือ /api/)
        # -------------------------
        location /api/videos/upload {
            proxy_pass http://app;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            client_max_body_size 2G;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # -------------------------
        # API
        # -------------------------
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://app;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 300s;
        }

        # -------------------------
        # Health
        # -------------------------
        location /health {
            proxy_pass http://app/api/health;
            access_log off;
        }

        # -------------------------
        # React Static Files (Production build)
        # -------------------------
        location / {
            root /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;  # SPA fallback

            # Cache static assets นาน
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            # ไม่ cache index.html เพื่อให้ได้ version ล่าสุดเสมอ
            location = /index.html {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }
    }
}