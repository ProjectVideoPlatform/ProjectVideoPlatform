worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    resolver 127.0.0.11 valid=30s;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 2G;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log notice;

    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=ws_limit:10m;

    upstream app {
        server app:3000;
    }

    upstream react_app {
        server react-app:5173;
    }

    upstream mongo_express {
        server mongo-express:8081;
    }

    server {
        listen 80;
        server_name localhost;

        # -------------------------
        # WebSocket (App backend)
        # -------------------------
        location /ws/ {
            proxy_pass http://app;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            limit_conn ws_limit 20;
        }

        # -------------------------
        # Upload (ต้องอยู่เหนือ /api/)
        # -------------------------
        location /api/videos/upload {
            proxy_pass http://app;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            client_max_body_size 2G;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # -------------------------
        # API
        # -------------------------
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://app;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 300s;
        }

        # -------------------------
        # Mongo Express
        # -------------------------
        location ^~ /mongo-express {
            rewrite ^/mongo-express(/.*)?$ $1 break;
            proxy_pass http://mongo_express;
        }

        # -------------------------
        # Health
        # -------------------------
        location /health {
            proxy_pass http://app/api/health;
            access_log off;
        }

        # -------------------------
        # Vite HMR WebSocket (dev)
        # -------------------------
        location /vite-hmr {
            proxy_pass http://react_app;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_read_timeout 3600s;
        }

        # -------------------------
        # React Frontend (Vite dev server)
        # -------------------------
        location / {
            proxy_pass http://react_app;
            proxy_http_version 1.1;

            # จำเป็นสำหรับ Vite HMR
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}