services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - ELASTIC_PASSWORD=changeme
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    deploy:
      resources:
        limits:
          memory: 2G
    ports:
      - "9200:9200"
    networks:
      - secure-video-network
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:changeme -s -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  setup-kibana-user:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    container_name: setup-kibana-user
    depends_on:
      elasticsearch:
        condition: service_healthy
    # แก้ไข Syntax ตรงนี้โดยใช้เครื่องหมาย \ เชื่อมบรรทัด หรือเขียนติดกัน
    command: >
      bash -c "curl -X POST -u elastic:changeme 'http://elasticsearch:9200/_security/user/kibana_system/_password' 
      -H 'Content-Type: application/json' 
      -d '{\"password\":\"kibana123\"}' && echo 'User setup complete'"
    networks:
      - secure-video-network
    restart: "no"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.1
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
      setup-kibana-user:
        condition: service_completed_successfully
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=kibana123
      - NODE_OPTIONS=--max-old-space-size=1536
    deploy:
      resources:
        limits:
          memory: 2G
    ports:
      - "5601:5601"
    networks:
      - secure-video-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:5601/api/status | grep -q 'available' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s

  fleet-server:
    image: docker.elastic.co/beats/elastic-agent:8.14.1
    container_name: fleet-server
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      - FLEET_SERVER_ENABLE=1
      - FLEET_SERVER_ELASTICSEARCH_HOST=http://elasticsearch:9200
      - FLEET_SERVER_ELASTICSEARCH_USERNAME=elastic
      - FLEET_SERVER_ELASTICSEARCH_PASSWORD=changeme
      - FLEET_SERVER_ELASTICSEARCH_INSECURE=true
      - FLEET_URL=http://fleet-server:8220
      - KIBANA_HOST=http://kibana:5601
      - KIBANA_FLEET_SETUP=1
      - FLEET_SERVER_INSECURE_HTTP=true
      - FLEET_SERVER_POLICY_ID=fleet-server-policy
      - FLEET_SERVER_POLICY_CREATE=1
      - FLEET_SERVER_HOST=0.0.0.0
      - FLEET_SERVER_PORT=8220
    ports:
      - "8220:8220"
      - "8200:8200"
    networks:
      - secure-video-network

networks:
  secure-video-network:
    driver: bridge