services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    container_name: elasticsearch

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - ELASTIC_PASSWORD=changeme
      - ES_JAVA_OPTS=-Xms1g -Xmx1g

    ports:
      - "9200:9200"

    networks:
      - secure-video-network

    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:changeme -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

    ulimits:
      memlock:
        soft: -1
        hard: -1

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.1
    container_name: kibana

    ports:
      - "5601:5601"

    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200

      # ใช้ elastic ไปก่อนง่ายสุด
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=00tlZ4C5ANNqvvoyHbWO
    depends_on:
      elasticsearch:
        condition: service_healthy

    networks:
      - secure-video-network

  fleet-server:
    image: docker.elastic.co/beats/elastic-agent:8.14.1
    container_name: fleet-server

    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_started

    environment:
      - FLEET_SERVER_ENABLE=1

      # Elasticsearch
      - FLEET_SERVER_ELASTICSEARCH_HOST=http://elasticsearch:9200
      - FLEET_SERVER_ELASTICSEARCH_USERNAME=elastic
      - FLEET_SERVER_ELASTICSEARCH_PASSWORD=changeme

      # Fleet URL
      - FLEET_URL=http://fleet-server:8220

      # Kibana
      - KIBANA_HOST=http://kibana:5601
      - KIBANA_FLEET_SETUP=1

      # dev mode
      - FLEET_SERVER_INSECURE_HTTP=true

    ports:
      - "8220:8220"
      - "8200:8200"

    networks:
      - secure-video-network

networks:
  secure-video-network:
    driver: bridge