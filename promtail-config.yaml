server:
  http_listen_port: 9080

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: nodejs_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: video-platform-api
          __path__: /var/log/app_logs/*.log # อ่านทุกไฟล์ .log ในโฟลเดอร์ logs
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            service: service