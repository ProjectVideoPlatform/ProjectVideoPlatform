server:
  http_listen_port: 9080

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ✅ ดัก Docker container logs โดยตรง
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # เอา container name มาเป็น label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      # เอา image มาเป็น label
      - source_labels: [__meta_docker_container_image]
        target_label: image
      # job = container name
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: job

    pipeline_stages:
      - json:
          expressions:
            level:   level
            message: message
            service: service
      - labels:
          level:
          service:

  # ✅ อ่านไฟล์ .log เหมือนเดิม (เก็บไว้ด้วย)
  - job_name: nodejs_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: video-platform-api
          __path__: /var/log/app_logs/*.log
    pipeline_stages:
      - json:
          expressions:
            level:   level
            message: message
            service: service
      - labels:
          level:
          service: