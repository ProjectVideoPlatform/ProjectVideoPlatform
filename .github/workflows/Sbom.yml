name: Secure Container Build

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-secure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # required for cosign keyless

    steps:

    # 1️⃣ Checkout
    - name: Checkout
      uses: actions/checkout@v4

    # 2️⃣ Login to GitHub Container Registry
    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    # 3️⃣ Build image (by commit SHA)
    - name: Build image
      run: |
        docker build \
          -t $IMAGE_NAME:$IMAGE_TAG \
          .

    # 4️⃣ Generate SBOM
    - name: Install Syft
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

    - name: Generate SBOM
      run: |
        syft $IMAGE_NAME:$IMAGE_TAG -o cyclonedx-json > sbom.json

    # 5️⃣ Vulnerability Scan (Grype)
    - name: Install Grype
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

    - name: Scan image
      run: |
        grype $IMAGE_NAME:$IMAGE_TAG --fail-on high

    # 6️⃣ Push image
    - name: Push image
      run: |
        docker push $IMAGE_NAME:$IMAGE_TAG

    # 7️⃣ Install Cosign
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    # 8️⃣ Sign image (keyless via OIDC)
    - name: Sign image
      run: |
        cosign sign --yes $IMAGE_NAME:$IMAGE_TAG

    # 9️⃣ Attach SBOM to registry
    - name: Attach SBOM
      run: |
        cosign attach sbom --sbom sbom.json $IMAGE_NAME:$IMAGE_TAG