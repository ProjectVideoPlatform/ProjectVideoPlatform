name: Build and Push Docker Image

on:
  push:
    branches:
      - "main" # รันเฉพาะตอน push เข้า branch main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend # แก้เป็น path ที่มี Dockerfile ของคุณ
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/secure-video-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend 1 # แก้เป็น path ที่มี Dockerfile ของคุณ
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/secure-video-frontend:latest