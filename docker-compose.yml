services:
  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: secure-video-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI (User/Pass: guest/guest)
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - secure-video-network
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Email Worker (Consumer)
  email-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-video-email-worker
    restart: unless-stopped
    command: ["node", "workers/emailWorker.js"]
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
    env_file:
      - ./BackEnd/.env
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    networks:
      - secure-video-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./BackEnd/keys:/app/keys:ro

  # Transcode Worker
  transcode-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-video-transcode-worker
    restart: unless-stopped
    command: ["node", "workers/transcodeWorker.js"]
    env_file:
      - ./BackEnd/.env
    environment:
      - NODE_ENV=production
    networks:
      - secure-video-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb1:
        condition: service_healthy
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp

  # React Frontend
  react-app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./Frontvideo1:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
    networks:
      - secure-video-network

  # Analytics Worker
  analytics-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-video-analytics-worker
    restart: unless-stopped
    command: ["node", "workers/analystic.js"]
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
    env_file:
      - ./BackEnd/.env
    environment:
        - NODE_ENV=production
        # - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672  <-- ลบออก
        - KAFKA_BROKERS=kafka:9092                         # <-- เพิ่มบรรทัดนี้
        - CLICKHOUSE_HOST=clickhouse
        - CLICKHOUSE_PORT=8123
        - CLICKHOUSE_USER=app_user
        - CLICKHOUSE_PASSWORD=strong_password
        - CLICKHOUSE_DB=app_db
    networks:
        - secure-video-network
    depends_on:
        kafka:                                             # <-- เปลี่ยนจาก rabbitmq
          condition: service_healthy
        clickhouse:
          condition: service_healthy
  # Main Node.js API (Producer)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-video-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ./BackEnd/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - KAFKA_BROKERS=kafka:9092
    volumes:
      - ./BackEnd/keys:/app/keys:ro
      - ./BackEnd/vault/certs:/app/vault-certs:ro
      - ./logs:/app/logs
    networks:
      - secure-video-network
    depends_on:
      mongodb1:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:                                             # <-- เพิ่มบรรทัดนี้
        condition: service_healthy
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # MongoDB Database
  mongodb1:
    image: mongo:7.0
    container_name: secure-video-mongodb1
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    environment:
      MONGO_INITDB_DATABASE: secure-video
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./BackEnd/mongo-init:/docker-entrypoint-initdb.d
    networks:
      - secure-video-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb2:
    image: mongo:7.0
    container_name: secure-video-mongodb2
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongodb2_data:/data/db
    networks:
      - secure-video-network

  mongodb3:
    image: mongo:7.0
    container_name: secure-video-mongodb3
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27019:27017"
    volumes:
      - mongodb3_data:/data/db
    networks:
      - secure-video-network

  # MongoDB Replica Set Initialization
  mongo-init:
    image: mongo:7.0
    container_name: secure-video-mongo-init
    depends_on:
      mongodb1:
        condition: service_healthy
      mongodb2:
        condition: service_started
      mongodb3:
        condition: service_started
    restart: "no"
    entrypoint: >
      bash -c "
      echo 'Waiting for MongoDB instances to be ready...' &&
      sleep 10 &&
      echo 'Initializing replica set...' &&
      mongosh --host mongodb1:27017 --eval '
        rs.initiate({
          _id: \"rs0\",
          members: [
            {_id: 0, host: \"mongodb1:27017\"},
            {_id: 1, host: \"mongodb2:27017\"},
            {_id: 2, host: \"mongodb3:27017\"}
          ]
        })
      ' &&
      echo 'Replica set initialization completed.'
      "
    networks:
      - secure-video-network

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: secure-video-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - secure-video-network
    command: redis-server --appendonly yes --requirepass redispassword123
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
# Kafka Message Broker (KRaft Mode)
  # Kafka Message Broker (KRaft Mode)
  kafka:
    image: apache/kafka:latest   # ใช้ Official Apache Image
    container_name: secure-video-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # แก้ไขบรรทัดนี้ให้เป็น Base64 UUID
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk' 
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - secure-video-network
    volumes:
      - kafka_data:/tmp/kraft-combined-logs # <-- Path เก็บข้อมูลของ official apache/kafka คือที่นี่
    healthcheck:
      # ปรับคำสั่ง healthcheck ให้ชัวร์ว่ารันได้ใน Container
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s  # <--- เพิ่มเวลาให้ Kafka ตั้งตัวได้นานขึ้น
  # Nginx
  nginx:
    image: nginx:1.25-alpine
    container_name: secure-video-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./BackEnd/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./BackEnd/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./BackEnd/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - secure-video-network
    depends_on:
      - app

  # Monitoring Profiles
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: secure-video-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - secure-video-network
    profiles:
      - monitoring

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:10.1.0
    container_name: secure-video-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: grafana123
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - secure-video-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_db
    restart: always
    ports:
      - "8123:8123"   # HTTP API
      - "9000:9000"   # Native client
    environment:
      CLICKHOUSE_USER: app_user
      CLICKHOUSE_PASSWORD: strong_password
      CLICKHOUSE_DB: app_db
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./init-clickhouse:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - secure-video-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Mongo Express (Admin UI for MongoDB)
  mongo-express:
    image: mongo-express:latest
    container_name: secure-video-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_BASICAUTH: "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "false"
      ME_CONFIG_MONGODB_URL: mongodb://mongodb1:27017,secure-video-mongodb2:27017,secure-video-mongodb3:27017/secure-video?replicaSet=rs0
    networks:
      - secure-video-network
    depends_on:
      - mongodb1
      - mongodb2
      - mongodb3
  # Vault - production-ready
  # vault:
  #   image: vault:1.13.3
  #   container_name: secure-video-vault
  #   restart: unless-stopped
  #   ports:
  #     - "8200:8200"
  #   environment:
  #     VAULT_ADDR: https://0.0.0.0:8200
  #   cap_add:
  #     - IPC_LOCK
  #   networks:
  #     - secure-video-network
  #   volumes:
  #     - vault_data:/vault/data
  #     - ./vault/config:/vault/config:ro
  #     - ./vault/certs:/vault/certs:ro
  #   command: "vault server -config=/vault/config/server.hcl"
  #   healthcheck:
  #     test: ["CMD", "vault", "status", "-address=https://0.0.0.0:8200"]
  #     interval: 10s
  #     retries: 5
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - secure-video-network    
    volumes:
      - loki-storage:/loki # Named Volume: เน้น Performance/Persistence     
      - ./loki-config.yaml:/etc/loki/local-config.yaml

  # 2. Promtail (ตัวดึง Log จากไฟล์ส่งไป Loki)
  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./logs:/var/log/app_logs  # เชื่อมโฟลเดอร์ logs จาก Node.js เข้าไป
      - ./promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - secure-video-network
  ml-worker:
    build:
      context: ./ml-worker
      dockerfile: Dockerfile
    container_name: secure-video-ml-worker
    restart: unless-stopped
    env_file:
      - ./BackEnd/.env
    environment:
      - PYTHONUNBUFFERED=1           # ให้ Python print log ออกมาที่ Docker ทันที
      - KAFKA_BROKERS=kafka:9092     # เชื่อมต่อ Kafka ผ่านชื่อ Service
      - REDIS_HOST=redis             # เชื่อมต่อ Redis ผ่านชื่อ Service
      - PINECONE_API_KEY=${PINECONE_API_KEY} # เตรียมไว้ดึงจาก .env ของคุณ
      - REDIS_PASSWORD=redispassword123
    networks:
      - secure-video-network 
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy    
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080" # เข้าผ่าน browser ที่ localhost:8080
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    networks:
      - secure-video-network
    depends_on:
      - kafka
networks:
  secure-video-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb2_data:
  mongodb3_data:
  redis_data:
  rabbitmq_data:
  app_logs:
  nginx_logs:
  prometheus_data:
  grafana_data:
  clickhouse_data:
  loki-storage: # ประกาศชื่อ Volume ไว้ที่นี่
  kafka_data: