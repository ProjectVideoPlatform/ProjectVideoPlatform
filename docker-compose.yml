services:
  # ─────────────────────────────────────────────────────────────
  # INFRASTRUCTURE & DATABASES  (Guaranteed Group)
  # จองแรมสูง + OOM Score ต่ำ → Linux ฆ่าทีหลังสุด
  # ─────────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    container_name: secure-video-rabbitmq
    restart: unless-stopped
    oom_score_adj: -500
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    deploy:
      resources:
        reservations:
          memory: 512M
        limits:
          memory: 1G
    networks:
      - secure-video-network
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb1:
    image: mongo:7.0
    container_name: secure-video-mongodb1
    restart: unless-stopped
    oom_score_adj: -500
    command: ["--replSet", "rs0", "--bind_ip_all"]
    environment:
      MONGO_INITDB_DATABASE: secure-video
    deploy:
      resources:
        reservations:
          cpus: '0.5'
          memory: 1.5G
        limits:
          cpus: '1.0'
          memory: 2G
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./BackEnd/mongo-init:/docker-entrypoint-initdb.d
    networks:
      - secure-video-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb2:
    image: mongo:7.0
    container_name: secure-video-mongodb2
    restart: unless-stopped
    oom_score_adj: -400
    command: ["--replSet", "rs0", "--bind_ip_all"]
    deploy:
      resources:
        reservations:
          memory: 1G
        limits:
          memory: 1.5G
    ports:
      - "27018:27017"
    volumes:
      - mongodb2_data:/data/db
    networks:
      - secure-video-network

  mongodb3:
    image: mongo:7.0
    container_name: secure-video-mongodb3
    restart: unless-stopped
    oom_score_adj: -400
    command: ["--replSet", "rs0", "--bind_ip_all"]
    deploy:
      resources:
        reservations:
          memory: 1G
        limits:
          memory: 1.5G
    ports:
      - "27019:27017"
    volumes:
      - mongodb3_data:/data/db
    networks:
      - secure-video-network

  mongo-init:
    image: mongo:7.0
    container_name: secure-video-mongo-init
    depends_on:
      mongodb1:
        condition: service_healthy
      mongodb2:
        condition: service_started
      mongodb3:
        condition: service_started
    restart: "no"
    entrypoint: >
      bash -c "
      echo 'Waiting for MongoDB instances to be ready...' &&
      sleep 10 &&
      echo 'Initializing replica set...' &&
      mongosh --host mongodb1:27017 --eval '
        rs.initiate({
          _id: \"rs0\",
          members: [
            {_id: 0, host: \"mongodb1:27017\"},
            {_id: 1, host: \"mongodb2:27017\"},
            {_id: 2, host: \"mongodb3:27017\"}
          ]
        })
      ' &&
      echo 'Replica set initialization completed.'
      "
    networks:
      - secure-video-network

  redis:
    image: redis:7.2-alpine
    container_name: secure-video-redis
    restart: unless-stopped
    oom_score_adj: -400
    expose:
      - "6379"
    deploy:
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 512M
    volumes:
      - redis_data:/data
    networks:
      - secure-video-network
    command: redis-server --appendonly yes --requirepass redispassword123
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword123", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # KAFKA  (KRaft Mode)
  # ─────────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:latest
    container_name: secure-video-kafka
    restart: unless-stopped
    oom_score_adj: -300
    expose:
      - "9092"
    user: root
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    deploy:
      resources:
        reservations:
          memory: 1G
        limits:
          memory: 2G
    networks:
      - secure-video-network
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    command:
      - "--kafka.server=secure-video-kafka:9092"
    ports:
      - "9308:9308"
    depends_on:
      - kafka
    networks:
      - secure-video-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=prometheus,health,info
      - MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED=true
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    networks:
      - secure-video-network
    depends_on:
      - kafka

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_db
    restart: always
    oom_score_adj: -300
    ports:
      - "8123:8123"
    environment:
      CLICKHOUSE_USER: app_user
      CLICKHOUSE_PASSWORD: strong_password
      CLICKHOUSE_DB: app_db
    deploy:
      resources:
        reservations:
          memory: 1G
        limits:
          memory: 2G
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./init-clickhouse:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - secure-video-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────────
  # APPLICATION SERVICES
  # ─────────────────────────────────────────────────────────────
      # - ELASTIC_APM_SERVER_URL=http://apm-server:8200
      # - ELASTIC_APM_SERVICE_NAME=my-securevideo-backend
      # - ELASTIC_APM_ENVIRONMENT=development
      # - ELASTIC_APM_ACTIVE=true
      # - ELASTIC_APM_SECRET_TOKEN=YOUR_FLEET_APM_SECRET_TOKEN
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-video-app
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      - "co.elastic.profiling/service-name=node-backend"
    env_file:
      - ./BackEnd/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - KAFKA_BROKERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redispassword123
      - ELASTIC_APM_SERVICE_NAME=node-backend
    deploy:
      resources:
        reservations:
          memory: 512M
        limits:
          memory: 1G
    volumes:
      - ./BackEnd/keys:/app/keys:ro
      - ./BackEnd/vault/certs:/app/vault-certs:ro
      - ./logs:/app/logs
    networks:
      - secure-video-network
    depends_on:
      mongodb1:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  recommendation-service:
    build:
      context: ./grpc-service
      dockerfile: Dockerfile
    container_name: recommendation-service-grpc
    expose:
      - "50051"
    labels:
      - "co.elastic.profiling/service-name=recommendation-service"
    env_file:
      - ./BackEnd/.env
    environment:
      - ELASTIC_APM_SERVICE_NAME=recommendation-service
    volumes:
      - ./BackEnd/proto:/proto
    deploy:
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c",
             "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - secure-video-network
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: secure-video-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        reservations:
          memory: 64M
        limits:
          memory: 256M
    volumes:
      - ./BackEnd/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./BackEnd/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      - ./Frontvideo1/dist:/var/www/html:ro
    networks:
      - secure-video-network
    # depends_on:
    #   app:
    #     condition: service_healthy

  # ─────────────────────────────────────────────────────────────
  # WORKERS  (Burstable Group)
  # ─────────────────────────────────────────────────────────────

  email-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-video-email-worker
    restart: unless-stopped
    command: ["node", "workers/emailWorker.js"]
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
    labels:
      - "co.elastic.profiling/service-name=email-worker"
    env_file:
      - ./BackEnd/.env
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - ELASTIC_APM_SERVICE_NAME=email-worker
    deploy:
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 256M
    networks:
      - secure-video-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./BackEnd/keys:/app/keys:ro

  transcode-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-video-transcode-worker
    restart: unless-stopped
    command: ["node", "workers/transcodeWorker.js"]
    labels:
      - "co.elastic.profiling/service-name=transcode-worker"
    env_file:
      - ./BackEnd/.env
    environment:
      - NODE_ENV=production
      - ELASTIC_APM_SERVICE_NAME=transcode-worker
    deploy:
      resources:
        reservations:
          memory: 256M
        limits:
          cpus: '2.0'
          memory: 1G
    networks:
      - secure-video-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb1:
        condition: service_healthy
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp

  analytics-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-video-analytics-worker
    command: ["node", "workers/analystic.js"]
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
    labels:
      - "co.elastic.profiling/service-name=analytics-worker"
    env_file:
      - ./BackEnd/.env
    environment:
      - NODE_ENV=production
      - KAFKA_BROKERS=kafka:9092
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=app_user
      - CLICKHOUSE_PASSWORD=strong_password
      - CLICKHOUSE_DB=app_db
      - ELASTIC_APM_SERVICE_NAME=analytics-worker
    deploy:
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 512M
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3098/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - secure-video-network

  trending-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trending_worker
    command: ["node", "workers/trendingWorker.js"]
    labels:
      - "co.elastic.profiling/service-name=trending-worker"
    env_file: ./BackEnd/.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redispassword123
      - ELASTIC_APM_SERVICE_NAME=trending-worker
    deploy:
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 256M
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3099/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - secure-video-network

  # ─────────────────────────────────────────────────────────────
  # ML WORKERS  (Burstable — CPU burst สูงตอนประมวลผล)
  # ─────────────────────────────────────────────────────────────

  ml-worker-history:
    build:
      context: ./ml-worker/history
      dockerfile: Dockerfile
    container_name: secure-video-ml-worker-history
    restart: unless-stopped
    labels:
      - "co.elastic.profiling/service-name=ml-worker-history"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - KAFKA_BROKERS=kafka:9092
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
      - ELASTIC_APM_SERVICE_NAME=ml-worker-history
    deploy:
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 512M
    env_file:
      - ./BackEnd/.env
    networks:
      - secure-video-network

  ml-worker-embedder:
    build:
      context: ./ml-worker/embedder
      dockerfile: Dockerfile
    container_name: secure-video-ml-worker-embedder
    restart: unless-stopped
    labels:
      - "co.elastic.profiling/service-name=ml-worker-embedder"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - PYTHONUNBUFFERED=1
      - TRANSFORMERS_CACHE=/app/model-cache
      - SENTENCE_TRANSFORMERS_HOME=/app/model-cache
      - ELASTIC_APM_SERVICE_NAME=ml-worker-embedder
    deploy:
      resources:
        reservations:
          cpus: '1.0'
          memory: 1.5G
        limits:
          cpus: '2.0'
          memory: 3G
    env_file:
      - ./BackEnd/.env
    volumes:
      - ml-model-cache:/app/model-cache
    networks:
      - secure-video-network

  user-vector-producer:
    build:
      context: ./ml-worker/user-vector
      dockerfile: Dockerfile
    container_name: user-vector-producer
    restart: unless-stopped
    command: python user-vector-producer.py
    labels:
      - "co.elastic.profiling/service-name=user-vector-producer"
    env_file:
      - ./BackEnd/.env
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: user-vector-refresh
      ELASTIC_APM_SERVICE_NAME: user-vector-producer
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    networks:
      - secure-video-network

  user-vector-worker:
    build:
      context: ./ml-worker/user-vector
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python user-vector-worker.py
    labels:
      - "co.elastic.profiling/service-name=user-vector-worker"
    env_file:
      - ./BackEnd/.env
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: user-vector-refresh
      KAFKA_GROUP: vector-workers
      WORKER_ID: "worker-{{.Task.Slot}}"
      SEED_LIMIT: "10"
      USER_VECTOR_TTL: "7200"
      THREAD_WORKERS: "8"
      MAX_POLL_RECORDS: "50"
      ELASTIC_APM_SERVICE_NAME: user-vector-worker
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      replicas: 3
      resources:
        reservations:
          memory: 512M
        limits:
          cpus: "1"
          memory: "1G"
    networks:
      - secure-video-network

  # ─────────────────────────────────────────────────────────────
  # APACHE FLINK  (Stream Processing)
  # ─────────────────────────────────────────────────────────────

  flink-jobmanager:
    build:
      context: ./flink-analytics
      dockerfile: Dockerfile
    image: flink-analytics:latest
    container_name: secure-video-flink-jobmanager
    restart: unless-stopped
    labels:
      - "co.elastic.profiling/service-name=flink-jobmanager"
    expose:
      - "6123"
    ports:
      - "8082:8081"
    command: standalone-job --job-classname com.securevideo.FlinkBehaviorJob
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redispassword123
      - KAFKA_BROKERS=kafka:9092
      - ELASTIC_APM_SERVICE_NAME=flink-jobmanager
      - |
        FLINK_PROPERTIES=
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        rest.port: 8081
    deploy:
      resources:
        reservations:
          memory: 512M
        limits:
          memory: 1G
    networks:
      - secure-video-network
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-savepoints:/opt/flink/savepoints

  flink-taskmanager:
    build:
      context: ./flink-analytics
      dockerfile: Dockerfile
    image: flink-analytics:latest
    container_name: secure-video-flink-taskmanager
    restart: unless-stopped
    labels:
      - "co.elastic.profiling/service-name=flink-taskmanager"
    depends_on:
      flink-jobmanager:
        condition: service_started
      kafka:
        condition: service_healthy
    command:
      - taskmanager
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redispassword123
      - KAFKA_BROKERS=kafka:9092
      - ELASTIC_APM_SERVICE_NAME=flink-taskmanager
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 1728m
        taskmanager.rpc.port: 6122
    deploy:
      resources:
        reservations:
          memory: 1.5G
        limits:
          memory: 2G
    networks:
      - secure-video-network

  # ─────────────────────────────────────────────────────────────
  # MONITORING STACK
  # ─────────────────────────────────────────────────────────────

  # cAdvisor — ดึง CPU/RAM ของทุก Container ส่ง Prometheus
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8089:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: secure-video-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - secure-video-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.1.0
    container_name: secure-video-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: grafana123
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    deploy:
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 512M
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - secure-video-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

  loki:
    image: grafana/loki:latest
    container_name: secure-video-loki
    expose:
      - "3100"
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - secure-video-network
    volumes:
      - loki-storage:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log/app_logs:/var/log/app_logs
    command: -config.file=/etc/promtail/config.yaml
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - secure-video-network

  # ─────────────────────────────────────────────────────────────
  # ADMIN UIs
  # ─────────────────────────────────────────────────────────────

  mongo-express:
    image: mongo-express:latest
    container_name: secure-video-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_BASICAUTH: "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "false"
      ME_CONFIG_MONGODB_URL: mongodb://mongodb1:27017,mongodb2:27017,mongodb3:27017/secure-video?replicaSet=rs0
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - secure-video-network
    depends_on:
      - mongodb1
      - mongodb2
      - mongodb3

networks:
  secure-video-network:
    driver: bridge

